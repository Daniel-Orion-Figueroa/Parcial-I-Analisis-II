<div class="loader-container">
  <div class="spinner" [class]="getLoaderClass()">
    <div class="spinner-circle"></div>
    <div class="spinner-circle"></div>
    <div class="spinner-circle"></div>
    <div class="spinner-circle"></div>
  </div>
  
  @if (showText && text) {
    <div class="loader-text" [class]="getTextClass()">
      {{ text }}
    </div>
  }
</div>
