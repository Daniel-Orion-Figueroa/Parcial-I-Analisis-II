<div class="reservations-page">
  <header class="page-header">
    <h1>Mis Reservas</h1>
    <p>Gestiona tus reservas de libros</p>
  </header>

  <div class="filters-section">
    <app-search-bar 
      placeholder="Buscar por título o autor..."
      [filters]="['En espera', 'Expiradas', 'Disponibles']"
      [showFilters]="true"
      (search)="onSearch($event)">
    </app-search-bar>
  </div>

  <div class="reservations-grid">
    @for (reservation of filteredReservations(); track reservation.id) {
      <app-reservation-card 
        [reservation]="reservation"
        [compact]="false"
        (cancel)="onCancelReservation($event)"
        (borrow)="onBorrowBook($event)"
        (viewDetails)="onViewReservationDetails($event)">
      </app-reservation-card>
    }
  </div>

  @if (filteredReservations().length === 0) {
    <app-empty-state 
      icon="�"
      title="No tienes reservas"
      message="Explora nuestro catálogo y reserva tu primer libro"
      [showAction]="true"
      actionText="Ir al Catálogo"
      action="/books">
    </app-empty-state>
  }

  <!-- Modal de Confirmación para Cancelar Reserva -->
  <app-confirm-dialog
    [isOpen]="isConfirmDialogVisible()"
    [isLoading]="isCancelling()"
    title="Cancelar Reserva"
    type="warning"
    confirmText="Sí, Cancelar"
    cancelText="No, Mantener"
    [message]="getCancelMessage()">
    (confirm)="onConfirmDialogConfirm()"
    (cancel)="onConfirmDialogClose()"
    (close)="onConfirmDialogClose()">
  </app-confirm-dialog>
</div>
