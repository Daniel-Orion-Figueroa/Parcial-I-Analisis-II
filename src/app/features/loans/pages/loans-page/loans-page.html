<div class="loans-page">
  <header class="page-header">
    <h1>Mis Préstamos</h1>
    <p>Gestiona tus préstamos activos y historial</p>
  </header>

  <!-- Estadísticas -->
  <div class="stats-container">
    <div class="stat-card active">
      <div class="stat-icon">📚</div>
      <div class="stat-content">
        <div class="stat-number">{{ getActiveLoansCount() }}</div>
        <div class="stat-label">Activos</div>
      </div>
    </div>
    
    <div class="stat-card overdue">
      <div class="stat-icon">⚠️</div>
      <div class="stat-content">
        <div class="stat-number">{{ getOverdueLoansCount() }}</div>
        <div class="stat-label">Vencidos</div>
      </div>
    </div>
    
    <div class="stat-card returned">
      <div class="stat-icon">✅</div>
      <div class="stat-content">
        <div class="stat-number">{{ getReturnedLoansCount() }}</div>
        <div class="stat-label">Devueltos</div>
      </div>
    </div>
  </div>

  <!-- Búsqueda y filtros -->
  <div class="search-section">
    <app-search-bar 
      placeholder="Buscar por título o autor..."
      [filters]="['Activos', 'Vencidos', 'Devueltos']"
      [showFilters]="true"
      (search)="onSearch($event)">
    </app-search-bar>
  </div>

  <!-- Lista de préstamos -->
  <div class="loans-container">
    @for (loan of filteredLoans(); track loan.id) {
      <app-loan-card 
        [loan]="loan"
        [showActions]="true"
        (renew)="onRenewLoan($event)"
        (returnBook)="onReturnBook($event)"
        (viewDetails)="onViewLoanDetails($event)">
      </app-loan-card>
    }
  </div>

  <!-- Estado vacío -->
  @if (filteredLoans().length === 0) {
    <app-empty-state 
      icon="📚"
      title="No se encontraron préstamos"
      message="No tienes préstamos que coincidan con los filtros actuales"
      [showAction]="true"
      actionText="Limpiar filtros"
      (action)="onSearch({ term: '', filter: '' })">
    </app-empty-state>
  }

  <!-- Modal de Confirmación para Devolución -->
  <app-confirm-dialog
    [isOpen]="isConfirmDialogVisible()"
    [isLoading]="isProcessing()"
    title="Confirmar Devolución"
    type="warning"
    confirmText="Sí, Devolver"
    cancelText="Cancelar"
    [message]="confirmMessage()"
    (confirm)="onConfirmDialogConfirm()"
    (cancel)="onConfirmDialogClose()"
    (close)="onConfirmDialogClose()">
  </app-confirm-dialog>
</div>
