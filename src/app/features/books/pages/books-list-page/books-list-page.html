<div class="books-page">
  <header class="page-header">
    <h1>Catálogo de Libros</h1>
    <p>Explora nuestra colección de libros disponibles</p>
  </header>

  <div class="search-section">
    <app-search-bar 
      placeholder="Buscar por título, autor o ISBN..."
      [filters]="['Ficción', 'Realismo Mágico', 'Ciencia Ficción', 'Fantasía', 'Historia']"
      [showFilters]="true"
      (search)="onSearch($event)">
    </app-search-bar>
  </div>

  <div class="books-grid">
    @for (book of filteredBooks(); track book.id) {
      <app-book-card 
        [book]="book" 
        [showActions]="true"
        (reserve)="onReserveBook($event)"
        (viewDetails)="onViewBookDetails($event)">
      </app-book-card>
    }
  </div>

  @if (filteredBooks().length === 0) {
    <app-empty-state 
      icon="📚"
      title="No se encontraron libros"
      message="Intenta con otros términos de búsqueda o filtros"
      [showAction]="true"
      actionText="Limpiar búsqueda"
      (action)="onSearch({ term: '', filter: '' })">
    </app-empty-state>
  }
</div>
