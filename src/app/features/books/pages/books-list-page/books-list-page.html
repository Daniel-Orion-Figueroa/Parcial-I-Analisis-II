<div class="books-page">
  <header class="page-header">
    <h1>Catálogo de Libros</h1>
    <p>Explora nuestra colección de libros disponibles</p>
  </header>

  <div class="search-section">
    <app-search-bar 
      placeholder="Buscar por título, autor o ISBN..."
      [filters]="['Ficción', 'Realismo Mágico', 'Ciencia Ficción', 'Fantasía', 'Historia']"
      [showFilters]="true"
      (search)="onSearch($event)">
    </app-search-bar>
  </div>

  <div class="books-grid">
    @for (book of filteredBooks(); track book.id) {
      <app-book-card 
        [book]="book" 
        [showActions]="true"
        [showEdit]="false"
        [showDelete]="false"
        (reserve)="onReserveBook($event)"
        (viewDetails)="onViewBookDetails($event)">
      </app-book-card>
    }
  </div>

  @if (filteredBooks().length === 0) {
    <app-empty-state 
      icon="📚"
      title="No se encontraron libros"
      message="Intenta con otros términos de búsqueda o filtros"
      [showAction]="true"
      actionText="Limpiar búsqueda"
      (action)="onSearch({ term: '', filter: '' })">
    </app-empty-state>
  }

  <!-- Modal de Reserva -->
  <app-reservation-modal
    [book]="selectedBook()"
    [isVisible]="isModalVisible()"
    [isLoading]="isReserving()"
    (close)="onModalClose()"
    (confirm)="onModalConfirm($event)">
  </app-reservation-modal>

  <!-- Modal de Confirmación para Éxito -->
  <app-confirm-dialog
    [isOpen]="isConfirmDialogVisible()"
    title="Reserva Exitosa"
    type="success"
    confirmText="Aceptar"
    [message]="confirmMessage()"
    (confirm)="onSuccessDialogClose()"
    (close)="onSuccessDialogClose()">
  </app-confirm-dialog>
</div>
