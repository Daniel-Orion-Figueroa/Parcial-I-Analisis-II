<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h1>Bienvenido</h1>
      <p>Inicia sesión en tu cuenta</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          class="form-input"
          placeholder="tu@email.com"
          [class.error]="email?.invalid && email?.touched"
        />
        <div class="error-message" *ngIf="email?.invalid && email?.touched">
          <span *ngIf="email?.errors?.['required']">El correo es requerido</span>
          <span *ngIf="email?.errors?.['email']">Formato de correo inválido</span>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="password-input">
          <input
            id="password"
            [type]="showPassword() ? 'text' : 'password'"
            formControlName="password"
            class="form-input"
            placeholder="••••••••"
            [class.error]="password?.invalid && password?.touched"
          />
          <button
            type="button"
            class="password-toggle"
            (click)="togglePassword()"
            aria-label="Toggle password visibility"
          >
            {{ showPassword() ? '👁️' : '👁️‍🗨️' }}
          </button>
        </div>
        <div class="error-message" *ngIf="password?.invalid && password?.touched">
          <span *ngIf="password?.errors?.['required']">La contraseña es requerida</span>
          <span *ngIf="password?.errors?.['minlength']">Mínimo 6 caracteres</span>
        </div>
      </div>

      <div class="form-actions">
        <button
          type="submit"
          class="auth-button"
          [disabled]="loginForm.invalid || isLoading()"
        >
          <span *ngIf="!isLoading()">Iniciar sesión</span>
          <span *ngIf="isLoading()" class="loading-spinner">
            Cargando...
          </span>
        </button>
      </div>
    </form>

    <div class="auth-footer">
      <p>¿No tienes cuenta? <a routerLink="/auth/register">Regístrate</a></p>
    </div>
  </div>
</div>
